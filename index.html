<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Ruhee!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      color: #333;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-emoji {
      font-size: 4rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .splash-text {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 700;
      color: #ff4b72;
      text-align: center;
      text-shadow: 0 2px 10px rgba(255,75,114,0.2);
    }

    .splash-sub {
      font-size: 1rem;
      color: #6a4c93;
      font-weight: 600;
      opacity: 0.8;
    }

    .enter-btn {
      padding: 1rem 3.5rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4b72 0%, #ff7eb3 100%);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(255,75,114,0.35);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      letter-spacing: 0.5px;
      animation: pulse-btn 2s ease-in-out infinite;
    }

    .enter-btn:hover {
      transform: scale(1.07) translateY(-3px);
      box-shadow: 0 14px 32px rgba(255,75,114,0.45);
    }

    .enter-btn:active { transform: scale(0.97); }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 8px 28px rgba(255,75,114,0.35); }
      50%      { box-shadow: 0 8px 38px rgba(255,75,114,0.6); }
    }

    /* Main container */
    .container {
      text-align: center;
      z-index: 10;
      padding: 3rem 4rem;
      max-width: 800px;
      width: 90%;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.1);
      transform: translateY(20px);
      opacity: 0;
    }

    .container.animate { animation: slide-up 1s cubic-bezier(0.16,1,0.3,1) forwards; }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      color: #ff4b72;
      line-height: 1.2;
      margin-bottom: 1rem;
      text-shadow: 0 4px 12px rgba(255,75,114,0.2);
      opacity: 0;
    }

    h1.animate { animation: bounce-in 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards 0.3s; }

    .typewriter-container {
      display: inline-block;
      margin: 0 auto 2rem;
      position: relative;
      max-width: 100%;
      overflow: hidden;
      height: 3rem;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      color: #6a4c93;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }

    .subtitle.animate { animation: typewriter 2.5s steps(40) forwards 1.2s; }

    .cursor {
      position: absolute;
      right: 0;
      width: 3px;
      height: 100%;
      background-color: #ff4b72;
      animation: blink 0.8s infinite;
    }

    .next-button {
      padding: 1rem 3rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4b72 0%, #ff7eb3 100%);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,75,114,0.3);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      opacity: 0;
      letter-spacing: 0.5px;
    }

    .next-button.animate { animation: fade-in 1s forwards 3s; }

    .next-button:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 12px 28px rgba(255,75,114,0.4);
    }

    .next-button:active { transform: scale(0.98) translateY(0); }

    /* Audio controls */
    .audio-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.8);
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      opacity: 0;
      transition: opacity 0.8s ease 0.5s, transform 0.3s ease;
    }

    .audio-controls.visible { opacity: 1; }
    .audio-controls:hover { transform: translateY(-2px); }

    .audio-controls button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #ff4b72;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .audio-controls button:hover { transform: scale(1.15); }

    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(255,75,114,0.2);
      border-radius: 5px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4b72;
      cursor: pointer;
      transition: transform 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .particle {
      position: absolute;
      z-index: 1;
      opacity: 0.8;
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce-in {
      0%   { transform: scale(0.8); opacity: 0; }
      60%  { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fade-in {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes typewriter {
      from { width: 0; padding-right: 5px; }
      to   { width: 100%; padding-right: 5px; }
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    @media (max-width: 768px) {
      .container { padding: 2rem 1.5rem; }
      .typewriter-container { height: 4rem; }
      .subtitle { white-space: normal; width: 100% !important; animation: none !important; opacity: 1 !important; }
      .cursor { display: none; }
      .audio-controls { bottom: 20px; right: 20px; padding: 10px 15px; }
    }
  </style>
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-emoji">🎂</div>
    <div class="splash-text">Someone special has a birthday!</div>
    <div class="splash-sub">🎵 Turn your volume up 🎵</div>
    <button class="enter-btn" id="enter-btn">Open Your Surprise 🎁</button>
  </div>

  <!-- Main Page -->
  <div class="container" id="main-container">
    <h1 id="main-title">Happy Birthday,<br>Ruhee! 🎉🎂</h1>
    <div class="typewriter-container">
      <div class="subtitle" id="subtitle">
        Hey Bestie! Ready for your special surprise?
        <span class="cursor"></span>
      </div>
    </div>
    <button class="next-button" id="next-btn" onclick="goToNextPage()">Let's Go! ✨</button>
  </div>

  <div class="audio-controls" id="audio-controls">
    <button id="play-pause">⏸️</button>
    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.5">
  </div>

  <!-- Hidden YouTube Player -->
  <div id="yt-player" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>

  <script>
    var player;
    var isPlaying = false;
    const playPauseBtn  = document.getElementById('play-pause');
    const volumeControl = document.getElementById('volume');

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        videoId: 'udra3Mfw2oo',
        playerVars: {
          autoplay: 0,
          loop: 1,
          playlist: 'udra3Mfw2oo',
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onReady: function(e) {
            e.target.setVolume(volumeControl.value * 100);
            window._ytReady = true;
          }
        }
      });
    }

    // Splash enter — user click satisfies browser autoplay policy
    document.getElementById('enter-btn').addEventListener('click', function () {
      // Dismiss splash
      document.getElementById('splash').classList.add('hidden');

      // Play music
      function tryPlay() {
        if (window._ytReady && player) {
          player.playVideo();
          isPlaying = true;
          playPauseBtn.innerHTML = '⏸️';
        } else {
          setTimeout(tryPlay, 200);
        }
      }
      tryPlay();

      // Kick off main animations
      setTimeout(() => {
        document.getElementById('main-container').classList.add('animate');
        document.getElementById('main-title').classList.add('animate');
        document.getElementById('subtitle').classList.add('animate');
        document.getElementById('next-btn').classList.add('animate');
        document.getElementById('audio-controls').classList.add('visible');
      }, 300);

      // Start particles
      for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 300);
      setInterval(createParticle, 800);
    });

    playPauseBtn.addEventListener('click', () => {
      if (!player || typeof player.getPlayerState !== 'function') return;
      if (isPlaying) {
        player.pauseVideo();
        playPauseBtn.innerHTML = '▶️';
      } else {
        player.playVideo();
        playPauseBtn.innerHTML = '⏸️';
      }
      isPlaying = !isPlaying;
    });

    volumeControl.addEventListener('input', () => {
      if (player && typeof player.setVolume === 'function') {
        player.setVolume(volumeControl.value * 100);
      }
    });

    function goToNextPage() {
      gsap.to('.container', {
        scale: 0.95, opacity: 0, duration: 0.4, ease: "power2.inOut",
        onComplete: () => { window.location.href = "memorylane.html"; }
      });
    }

    function createParticle() {
      const elements = ['🎈', '✨', '❤️', '🌸', '🎉'];
      const particle  = document.createElement('div');
      particle.className = 'particle';
      particle.innerHTML = elements[Math.floor(Math.random() * elements.length)];
      const startX = Math.random() * window.innerWidth;
      const size   = Math.random() * 20 + 15;
      particle.style.left     = startX + 'px';
      particle.style.top      = (window.innerHeight + 50) + 'px';
      particle.style.fontSize = size + 'px';
      document.body.appendChild(particle);
      gsap.to(particle, {
        y: -(window.innerHeight + 150),
        x: startX + (Math.random() * 100 - 50),
        rotation: Math.random() * 360,
        duration: Math.random() * 8 + 8,
        ease: "none",
        onComplete: () => particle.remove()
      });
    }
  </script>

</body>
</html>
