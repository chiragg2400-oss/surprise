<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Ruhee!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ── Base & Reset ─────────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      /* Animated Soft Gradient Background */
      background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      color: #333;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ── Glassmorphism Container ──────────────────────────────── */
    .container {
      text-align: center;
      z-index: 10;
      padding: 3rem 4rem;
      max-width: 800px;
      width: 90%;
      /* Premium Glass Effect */
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      transform: translateY(20px);
      opacity: 0;
      animation: slide-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Typography ───────────────────────────────────────────── */
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      color: #ff4b72;
      line-height: 1.2;
      margin-bottom: 1rem;
      text-shadow: 0 4px 12px rgba(255, 75, 114, 0.2);
      opacity: 0;
      animation: bounce-in 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.3s;
    }

    .typewriter-container {
      display: inline-block;
      margin: 0 auto;
      position: relative;
      max-width: 100%;
      overflow: hidden;
      height: 3rem;
      margin-bottom: 2rem;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      color: #6a4c93;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typewriter 2.5s steps(40) forwards 1.2s;
    }

    .cursor {
      position: absolute;
      right: 0;
      width: 3px;
      height: 100%;
      background-color: #ff4b72;
      animation: blink 0.8s infinite;
    }

    /* ── Button ───────────────────────────────────────────────── */
    .next-button {
      padding: 1rem 3rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4b72 0%, #ff7eb3 100%);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 75, 114, 0.3);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      animation: fade-in 1s forwards 3s;
      letter-spacing: 0.5px;
    }

    .next-button:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 12px 28px rgba(255, 75, 114, 0.4);
    }

    .next-button:active {
      transform: scale(0.98) translateY(0);
    }

    /* ── Audio Controls ───────────────────────────────────────── */
    .audio-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease;
    }

    .audio-controls:hover {
      transform: translateY(-2px);
    }

    .audio-controls button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #ff4b72;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .audio-controls button:hover {
      transform: scale(1.15);
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(255, 75, 114, 0.2);
      border-radius: 5px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4b72;
      cursor: pointer;
      transition: transform 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    /* ── Floating Particles ───────────────────────────────────── */
    .particle {
      position: absolute;
      z-index: 1;
      opacity: 0.8;
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
    }

    /* ── Animations ───────────────────────────────────────────── */
    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce-in {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      60% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes typewriter {
      from {
        width: 0;
        padding-right: 5px;
      }

      to {
        width: 100%;
        padding-right: 5px;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem 1.5rem;
      }

      .typewriter-container {
        height: 4rem;
      }

      .subtitle {
        white-space: normal;
        width: 100%;
        animation: none;
        opacity: 0;
        animation: fade-in 1s forwards 1.2s;
      }

      .cursor {
        display: none;
      }

      .audio-controls {
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Happy Birthday,<br>Ruhee! 🎉🎂</h1>
    <div class="typewriter-container">
      <div class="subtitle">
        Hey Bestie! Ready for your special surprise?
        <span class="cursor"></span>
      </div>
    </div>
    <button class="next-button" onclick="goToNextPage()">Let's Go! ✨</button>
  </div>

  <div class="audio-controls">
    <button id="play-pause">▶️</button>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
  </div>

  <audio id="birthday-song" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
  </audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // ── Audio Logic ──
    const audio = document.getElementById('birthday-song');
    const playPauseBtn = document.getElementById('play-pause');
    const volumeControl = document.getElementById('volume');
    let isPlaying = false;

    audio.volume = volumeControl.value;

    window.addEventListener('load', () => {
      setTimeout(() => {
        audio.play().then(() => {
          isPlaying = true;
          playPauseBtn.innerHTML = '⏸️';
        }).catch(err => console.log("Autoplay prevented:", err));
      }, 1000);
    });

    playPauseBtn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        playPauseBtn.innerHTML = '▶️';
      } else {
        audio.play();
        playPauseBtn.innerHTML = '⏸️';
      }
      isPlaying = !isPlaying;
    });

    volumeControl.addEventListener('input', () => {
      audio.volume = volumeControl.value;
    });

    // ── Navigation Logic ──
    function goToNextPage() {
      gsap.to('.container', {
        scale: 0.95,
        opacity: 0,
        duration: 0.4,
        ease: "power2.inOut",
        onComplete: () => {
          window.location.href = "memorylane.html";
        }
      });
    }

    // ── Floating Elements Generator (Smooth GSAP) ──
    function createParticle() {
      const elements = ['🎈', '✨', '❤️', '🌸', '🎉'];
      const particle = document.createElement('div');

      particle.className = 'particle';
      particle.innerHTML = elements[Math.floor(Math.random() * elements.length)];

      // Randomize starting properties
      const startX = Math.random() * window.innerWidth;
      const size = Math.random() * 20 + 15; // 15px to 35px

      particle.style.left = startX + 'px';
      particle.style.top = (window.innerHeight + 50) + 'px';
      particle.style.fontSize = size + 'px';

      document.body.appendChild(particle);

      // Dreamy, slow float upward
      gsap.to(particle, {
        y: -(window.innerHeight + 150),
        x: startX + (Math.random() * 100 - 50),
        rotation: Math.random() * 360,
        duration: Math.random() * 8 + 8, // 8s to 16s (slower, more elegant)
        ease: "none",
        onComplete: () => particle.remove()
      });
    }

    // Generate particles periodically
    window.addEventListener('load', () => {
      // Initial burst
      for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 300);
      // Continuous flow
      setInterval(createParticle, 800);
    });
  </script>
</body>

</html>
