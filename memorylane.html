<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Lane ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────────────── */
    :root {
      --rose:        #C2185B;
      --rose-light:  #F48FB1;
      --blush:       #FCE4EC;
      --blush-mid:   #F8BBD9;
      --cream:       #FFF8F3;
      --warm-white:  #FFFBF8;
      --lavender:    #EDE7F6;
      --purple:      #7B1FA2;
      --gold:        #C9960C;
      --text-dark:   #2C1810;
      --text-mid:    #6B4C5A;
      --text-light:  #A08090;
      --glass:       rgba(255, 255, 255, 0.62);
      --glass-border:rgba(255, 255, 255, 0.75);
      --shadow-rose: 0 8px 32px rgba(194, 24, 91, 0.15);
      --shadow-soft: 0 4px 24px rgba(44, 24, 16, 0.08);
      --radius-card: 20px;
      --radius-pill: 100px;
      --transition:  0.35s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Background ────────────────────────────────────────── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(248,187,217,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(237,231,246,.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,248,243,.9) 0%, transparent 70%);
    }

    /* ── Confetti ──────────────────────────────────────────── */
    #confetti-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; top: -20px; opacity: 0; border-radius: 2px;
    }
    @keyframes floatDown {
      0%   { transform: translateY(-10px) rotate(0deg);   opacity: .9; }
      100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
    }

    /* ── Balloons ──────────────────────────────────────────── */
    .balloon {
      position: fixed; width: 44px; height: 54px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      z-index: 0; pointer-events: none;
      animation: riseUp linear infinite;
    }
    .balloon::after {
      content: ''; position: absolute;
      width: 1.5px; height: 70px;
      background: rgba(100,60,60,.25);
      bottom: -70px; left: 50%; transform: translateX(-50%);
    }
    @keyframes riseUp {
      0%   { transform: translateY(110vh) translateX(0)  scale(1);   opacity: .8; }
      50%  { transform: translateY(50vh)  translateX(18px) scale(1); opacity: .8; }
      100% { transform: translateY(-15vh) translateX(0)  scale(.9);  opacity: 0; }
    }

    /* ── Floating Stickers ─────────────────────────────────── */
    .sticker {
      position: fixed; width: 52px; height: 52px;
      pointer-events: none; z-index: 2;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
    }
    .sticker1 { top: 8%;  left: 3%; }
    .sticker2 { bottom: 12%; right: 3%; }
    .sticker3 { bottom: 28%; left: 6%; }
    .sticker4 { top: 18%; right: 6%; }
    @keyframes floatSticker {
      0%, 100% { transform: translateY(0)    rotate(0deg); }
      50%       { transform: translateY(-12px) rotate(6deg); }
    }

    /* ── Layout ────────────────────────────────────────────── */
    .page-wrapper {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 3vw, 2rem);
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      text-align: center;
      padding: clamp(2rem, 5vw, 4rem) 0 clamp(1.5rem, 3vw, 2.5rem);
      animation: heroIn .9s ease both;
    }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      color: var(--rose); font-size: .78rem; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase;
      padding: .4rem 1.1rem; border-radius: var(--radius-pill);
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow-soft);
    }
    .header-badge span { font-size: 1rem; }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 7vw, 5rem);
      font-weight: 600; line-height: 1.1;
      color: var(--rose);
      text-shadow: 0 2px 20px rgba(194,24,91,.15);
      margin-bottom: 1rem;
    }
    .header h1 em {
      font-style: italic; color: var(--purple);
    }

    .header-sub {
      max-width: 560px; margin: 0 auto;
      font-size: clamp(.9rem, 2.2vw, 1.05rem);
      line-height: 1.7; color: var(--text-mid);
      font-weight: 300;
    }

    /* ── Slideshow Controls ────────────────────────────────── */
    .slideshow-controls {
      display: flex; justify-content: center; gap: .75rem;
      margin: 0 0 2rem;
      animation: heroIn .9s ease .3s both;
    }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .7rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem; font-weight: 500; letter-spacing: .02em;
      color: white;
      background: linear-gradient(135deg, var(--rose) 0%, var(--purple) 100%);
      border: none; border-radius: var(--radius-pill);
      cursor: pointer; user-select: none;
      box-shadow: 0 4px 18px rgba(194,24,91,.3);
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(194,24,91,.38); }
    .btn:active { transform: translateY(0); }

    .btn-outline {
      background: var(--glass); backdrop-filter: blur(10px);
      border: 1.5px solid var(--blush-mid); color: var(--rose);
      box-shadow: var(--shadow-soft);
    }
    .btn-outline:hover { background: white; box-shadow: var(--shadow-rose); }

    /* ── Gallery ───────────────────────────────────────────── */
    .gallery-wrap {
      position: relative;
      margin: 0 -1rem;
      animation: heroIn .9s ease .5s both;
    }

    .gallery {
      display: flex; flex-wrap: nowrap; gap: 1.25rem;
      padding: 2.5rem 1.5rem 2rem;
      overflow-x: auto; overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: var(--blush-mid) transparent;
    }
    .gallery::-webkit-scrollbar { height: 5px; }
    .gallery::-webkit-scrollbar-track { background: transparent; }
    .gallery::-webkit-scrollbar-thumb { background: var(--blush-mid); border-radius: 10px; }

    /* ── Memory Card ───────────────────────────────────────── */
    .memory-card {
      flex: 0 0 auto;
      width: min(78vw, 280px);
      aspect-ratio: 3 / 4;
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
      background: white;
      scroll-snap-align: center;

      /* Scrapbook tilt */
      transform: translateY(40px) rotate(var(--rotate, 0deg));
      opacity: 0;
      transition: transform .7s cubic-bezier(.175,.885,.32,1.275),
                  opacity .6s ease,
                  box-shadow .3s ease;

      /* Polaroid-style border */
      box-shadow:
        0 0 0 8px white,
        0 4px 24px rgba(44,24,16,.12),
        0 12px 40px rgba(194,24,91,.1);
    }

    .memory-card.visible {
      transform: translateY(0) rotate(var(--rotate, 0deg));
      opacity: 1;
    }

    .memory-card:hover {
      transform: translateY(-6px) rotate(0deg) scale(1.02);
      box-shadow:
        0 0 0 8px white,
        0 16px 50px rgba(44,24,16,.18),
        0 24px 60px rgba(194,24,91,.18);
      z-index: 5;
    }

    /* Tape strip */
    .card-tape {
      position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%) rotate(var(--rotate, 2deg));
      width: 70px; height: 26px;
      background: rgba(255,255,255,.85);
      border-radius: 3px;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
      z-index: 6;
      backdrop-filter: blur(4px);
    }

    .memory-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }
    .memory-card:hover .memory-img { transform: scale(1.06); }

    /* Caption overlay */
    .memory-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.1rem 1rem .9rem;
      background: linear-gradient(
        to top,
        rgba(30,8,20,.85) 0%,
        rgba(30,8,20,.6) 60%,
        transparent 100%
      );
      color: white;
      font-size: .82rem; line-height: 1.5;
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.68,-.55,.27,1.55);
    }
    .memory-card:hover .memory-caption { transform: translateY(0); }

    /* Corner emoji sticker */
    /* Corner emoji sticker */
.card-sticker {
  position: absolute; 
  top: 10px; /* Changed bottom to top */
  right: 10px;
  width: 34px; 
  height: 34px; 
  z-index: 4;
  transform: rotate(12deg);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.2));
  animation: stickerBounce 2.5s ease-in-out infinite;
}
    @keyframes stickerBounce {
      0%, 100% { transform: scale(1)   rotate(12deg); }
      50%       { transform: scale(1.2) rotate(18deg); }
    }

    /* ── Nav ───────────────────────────────────────────────── */
    .nav-footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
      padding: 2.5rem 0 1.5rem;
      animation: heroIn .9s ease .7s both;
    }

    .btn-next {
      background: linear-gradient(135deg, #E91E8C 0%, #7B1FA2 100%);
      font-size: .95rem; padding: .85rem 2rem;
      position: relative; overflow: hidden;
    }
    .btn-next::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: shine 3s ease-in-out infinite;
    }
    @keyframes shine {
      0%   { transform: translateX(-100%); }
      30%  { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    /* ── Responsive tweaks ─────────────────────────────────── */
    @media (min-width: 600px) {
      .memory-card { width: 260px; }
      .sticker { width: 60px; height: 60px; }
    }
    @media (min-width: 900px) {
      .memory-card { width: 280px; }
    }
    @media (max-width: 400px) {
      .memory-card { width: 82vw; }
      .nav-footer { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div id="confetti-container"></div>

<!-- Balloons -->
<div class="balloon" style="left:8%;  background:radial-gradient(circle at 35% 30%,#F48FB1,#C2185B); animation-duration:18s;"></div>
<div class="balloon" style="left:22%; background:radial-gradient(circle at 35% 30%,#CE93D8,#7B1FA2); animation-duration:14s; animation-delay:3s;"></div>
<div class="balloon" style="left:68%; background:radial-gradient(circle at 35% 30%,#F48FB1,#E91E8C); animation-duration:21s; animation-delay:6s;"></div>
<div class="balloon" style="left:84%; background:radial-gradient(circle at 35% 30%,#90CAF9,#5C6BC0); animation-duration:16s; animation-delay:1s;"></div>
<div class="balloon" style="left:44%; background:radial-gradient(circle at 35% 30%,#FFCC80,#F57C00); animation-duration:23s; animation-delay:8s;"></div>

<!-- Stickers -->
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23C2185B'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='44' text-anchor='middle' fill='white'%3E✨%3C/text%3E%3C/svg%3E" class="sticker sticker1" alt="" style="animation: floatSticker 3s ease-in-out infinite;">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%237B1FA2'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='44' text-anchor='middle' fill='white'%3E♥%3C/text%3E%3C/svg%3E" class="sticker sticker2" alt="" style="animation: floatSticker 3.5s ease-in-out .5s infinite;">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23E91E8C'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='44' text-anchor='middle' fill='white'%3E★%3C/text%3E%3C/svg%3E" class="sticker sticker3" alt="" style="animation: floatSticker 4s ease-in-out .8s infinite;">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23C9960C'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='44' text-anchor='middle' fill='white'%3E🎀%3C/text%3E%3C/svg%3E" class="sticker sticker4" alt="" style="animation: floatSticker 3.2s ease-in-out 1.2s infinite;">

<div class="page-wrapper">

  <!-- Header -->
  <header class="header">
    <div class="header-badge"><span>📸</span> A Journey Through Time</div>
    <h1>Our <em>Memory</em> Lane</h1>
    <p class="header-sub">A scroll through the most beautiful moments we've shared together. Hover over each photo to read why these memories mean everything to me. 🌸</p>
  </header>

  <!-- Slideshow Controls -->
  <div class="slideshow-controls">
    <button id="startSlideshow" class="btn" style="display:flex;">▶&nbsp; Start Slideshow</button>
    <button id="pauseSlideshow" class="btn" style="display:none;">⏸&nbsp; Pause</button>
  </div>

  <!-- Gallery -->
  <div class="gallery-wrap">
    <div class="gallery" id="memoryGallery">
      <!-- Cards injected by JS below -->
    </div>
  </div>

  <!-- Footer Nav -->
  <nav class="nav-footer">
    <button id="backButton" class="btn btn-outline">← Back to Welcome</button>
    <button id="nextButton" class="btn btn-next">✨ Next Surprise ✨</button>
  </nav>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// ── Data ─────────────────────────────────────────────────────────
const memories = [
  { image:'6.jpg',   caption:'From eating Chinese after work to my sudden selfie enthusiasm in the crowded railway station… what a fun, messy, perfect day with my favorite person! 😂', rotationAngle:-2, emoji:'🌊' },
  { image:'2.JPG',   caption:'Remember the day I came to give you your birthday present but got so happy seeing you that I almost walked away with the gift still in my hand? You had to remind me! 😂', rotationAngle:3, emoji:'🌅' },
  { image:'3.jpg',   caption:'From nonstop gossip at work → Maggie in break → post logout H&M birthday shopping with you. That whole day was pure gold. So grateful for you!', rotationAngle:-1, emoji:'🚗' },
  { image:'4.jpg',   caption:'Unforgettable memory: Seeing you after 2 months since leaving work, then having the greatest time at your home with those heavenly vadapav brought by your mom. Best day ever!', rotationAngle:2, emoji:'🍕' },
  { image:'5.jpg',   caption:'Just two people who got crazy over caramel popcorn.', rotationAngle:-3, emoji:'🏕️' },
  { image:'7.jpg',   caption:'After logout outing, eating your favorite Paneer Makhanwaala (which I labeled as dessert), and clicking my first picture with you, that too both in brown. Easily in my top 3 outings with you.', rotationAngle:1, emoji:'🎵' },
  { image:'8.jpg',   caption:'From Marine Drive Polaroids to the cash hassle and then Gateway of India clicks… that whole day was pure magic with you!', rotationAngle:-2, emoji:'🏰' },
  { image:'1.jpg',   caption:"You sent me your cute childhood birthday party picture and me replying 'it's a very heart melting moment'… while secretly wishing I was right there with little you.", rotationAngle:2, emoji:'🏖️' },
  { image:'2.JPG',   caption:'Throwback to getting our pics taken, leaving, and then running back like crazy to ask the cameraman for digital photos. Chaotic but one of my favorite memories with you!', rotationAngle:-1, emoji:'💕' },
  { image:'3.jpg',   caption:'Happy Birthday to my best friend in the whole world! Here\'s to many more adventures together!', rotationAngle:3, emoji:'🎂' },
];

// ── Confetti ──────────────────────────────────────────────────────
(function createConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#F48FB1','#CE93D8','#FFCC80','#80CBC4','#F06292','#9FA8DA'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${6+Math.random()*10}px;
      height:${6+Math.random()*14}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation:floatDown ${3+Math.random()*4}s ease-in ${Math.random()*5}s infinite;
      opacity:${0.5+Math.random()*.5};
    `;
    container.appendChild(el);
  }
})();

// ── Build Gallery ─────────────────────────────────────────────────
const gallery = document.getElementById('memoryGallery');

memories.forEach((mem, i) => {
  const card = document.createElement('div');
  card.className = 'memory-card';
  card.style.setProperty('--rotate', `${mem.rotationAngle}deg`);
  card.innerHTML = `
    <div class="card-tape" style="--rotate:${mem.rotationAngle*2}deg"></div>
    <img class="memory-img" src="${mem.image}" alt="Memory ${i+1}" loading="lazy">
    <div class="memory-caption">${mem.caption}</div>
    <div class="card-sticker">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#C2185B"/>
        <text x="50" y="66" font-family="Arial" font-size="44" text-anchor="middle" fill="white">${mem.emoji}</text>
      </svg>
    </div>
  `;
  gallery.appendChild(card);
});

// ── Intersection observer to animate cards ───────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.memory-card').forEach((c, i) => {
  observer.observe(c);
  setTimeout(() => c.classList.add('visible'), 400 + i * 120);
});

// ── Slideshow ─────────────────────────────────────────────────────
let slideshowInterval = null;
let currentSlide = 0;

const startBtn = document.getElementById('startSlideshow');
const pauseBtn = document.getElementById('pauseSlideshow');

function startSlideshow() {
  startBtn.style.display = 'none';
  pauseBtn.style.display = 'flex';
  clearInterval(slideshowInterval);
  slideshowInterval = setInterval(() => {
    currentSlide = (currentSlide + 1) % memories.length;
    const cards = gallery.querySelectorAll('.memory-card');
    if (cards[currentSlide]) {
      gallery.scrollTo({ left: cards[currentSlide].offsetLeft - gallery.clientWidth/2 + cards[currentSlide].clientWidth/2, behavior:'smooth' });
    }
  }, 2000);
}

function pauseSlideshow() {
  pauseBtn.style.display = 'none';
  startBtn.style.display = 'flex';
  clearInterval(slideshowInterval);
  slideshowInterval = null;
}

startBtn.addEventListener('click', startSlideshow);
pauseBtn.addEventListener('click', pauseSlideshow);

// ── Navigation ────────────────────────────────────────────────────
document.getElementById('backButton').addEventListener('click', () => window.location.href = 'index.html');
document.getElementById('nextButton').addEventListener('click', () => window.location.href = 'cake.html');

// ── GSAP hover ────────────────────────────────────────────────────
document.querySelectorAll('.memory-card').forEach(card => {
  card.addEventListener('mouseenter', () => gsap.to(card, { scale:1.04, duration:.3 }));
  card.addEventListener('mouseleave', () => gsap.to(card, { scale:1, duration:.3 }));
});
</script>
</body>
</html>
